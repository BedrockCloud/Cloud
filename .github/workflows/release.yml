name: Release

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci ignore')"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
      - name: Give permissions
        run: chmod +x gradlew
      - name: Setup java
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: 'adopt'
      - name: Run build with Gradle Wrapper
        run: ./gradlew build
      - name: Get version
        id: metadata
        run: |
          VERSION=$(grep 'version:' src/main/resources/version.yml | cut -d ':' -f2 | tr -d ' ')
          echo "::set-output name=VERSION::$VERSION"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bedrockcloud
          path: build/libs/Cloud.jar
      - name: Upload release
        if: startsWith(github.event.head_commit.message, 'Release ')
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "${{ steps.metadata.outputs.VERSION }}"
          prerelease: false
          title: "${{ steps.metadata.outputs.VERSION }}"
          files: |
            build/libs/Cloud-1.0-SNAPSHOT.jar
      - name: Publish package
        run: ./gradlew publish
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}